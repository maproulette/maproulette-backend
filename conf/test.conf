include "application.conf"

# Test configuration for Playwright E2E tests
# This uses environment variables set by the test setup

play.http.secret.key = "TEST_SECRET_KEY_32_CHARS_LONG_12345678901234567890"
play.http.secret.key = ${?APPLICATION_SECRET}

db.default {
  url=${?MR_DATABASE_URL}
  username=${?MR_DATABASE_USERNAME}
  password=${?MR_DATABASE_PASSWORD}
  logSql=false
}

maproulette {
  debug=true
  bootstrap=true

  secret.key = "TEST_SECRET_KEY_32_CHARS_LONG_12345678901234567890"
  secret.key = ${?MAPROULETTE_SECRET_KEY}

  scheduler {
    startTimeJitterForMinuteTasks = "15 seconds"
    startTimeJitterForHourTasks = "30 seconds"
  }
}

osm {
  server=${?MR_OSM_SERVER}
  consumerKey=${?MR_OAUTH_CONSUMER_KEY}
  consumerSecret=${?MR_OAUTH_CONSUMER_SECRET}
}

